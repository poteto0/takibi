<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>catiy</title>
    <style>
      body {
        background: #000;
        margin: 0;
        padding: 0;
        display: flex;
        height: 100vh;
        width: 100vw;
        color: white;
        font-family: sans-serif;
      }
      .left-panel {
        flex: 1;
        overflow-y: auto;
        position: relative;
        background: #000;
      }
      .left-panel img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      #close-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(255, 0, 0, 0.7);
        color: white;
        border: none;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        font-size: 20px;
        cursor: pointer;
        display: none;
        z-index: 10;
        align-items: center;
        justify-content: center;
        line-height: 1;
      }
      #close-btn:hover {
        background: rgba(255, 0, 0, 1);
      }
      .right-panel {
        width: 150px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        padding: 20px;
        background: #111;
        border-left: 1px solid #333;
        overflow-y: auto;
      }
      button {
        padding: 12px;
        background: #333;
        color: white;
        border: 1px solid #444;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        transition: background 0.2s;
      }
      button:hover {
        background: #444;
      }
      button:active {
        background: #222;
      }
    </style>
  </head>
  <body>
    hello takibi
  </body>
</html>
